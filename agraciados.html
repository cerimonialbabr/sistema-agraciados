<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Gerenciar Agraciados | Sistema de Gerenciamento de Agraciados</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root{
      --azul-escuro:#071b33;
      --azul:#0b3a75;
      --azul-hover:#082a54;
      --fundo:#f3f5f8;
      --branco:#ffffff;
      --texto:#1f2937;
      --texto-secundario:#4b5563;
      --borda:#d7dee8;
      --cinza:#6b7280;
      --cinza-hover:#525a67;
      --vermelho:#b42318;
      --vermelho-hover:#912018;
      --verde:#067647;
      --sombra:0 4px 12px rgba(0,0,0,.08);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      font-family:Arial,sans-serif;
      background:var(--fundo);
      color:var(--texto);
    }

    button,
    input{
      font:inherit;
    }

    .container{
      max-width:760px;
      margin:auto;
      padding:16px;
    }

    .topo-sistema{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:20px 18px;
      margin-bottom:16px;
      border-radius:16px;
      background:var(--azul-escuro);
      color:var(--branco);
      box-shadow:0 4px 14px rgba(0,0,0,.18);
      text-align:left;
    }

    .topo-sistema img{
      width:78px;
      height:78px;
      flex-shrink:0;
      object-fit:contain;
    }

    .titulo-sistema{
      color:#fff;
      font-size:22px;
      font-weight:800;
      line-height:1.15;
    }

    .subtitulo-sistema{
      margin-top:6px;
      color:#dbeafe;
      font-size:14px;
      font-weight:700;
    }

    .card{
      margin-bottom:16px;
      padding:18px;
      border-radius:14px;
      background:var(--branco);
      box-shadow:var(--sombra);
    }

    .evento-titulo{
      color:var(--azul);
      font-size:18px;
      font-weight:800;
      line-height:1.2;
    }

    .evento-detalhes{
      margin-top:4px;
      color:#374151;
      font-size:14px;
      font-weight:600;
      line-height:1.4;
    }

    .titulo-pagina{
      margin:8px 0;
      text-align:center;
      font-size:32px;
      font-weight:700;
      line-height:1.2;
    }

    .descricao{
      max-width:650px;
      margin:10px auto 18px;
      text-align:center;
      color:var(--texto-secundario);
      font-size:15px;
      line-height:1.4;
    }

    .barra-acoes{
      display:flex;
      flex-wrap:nowrap;
      align-items:flex-end;
      gap:10px;
      margin-bottom:16px;
    }

    .campo-pesquisa{
      flex:1 1 auto;
      min-width:0;
    }

    label{
      display:block;
      margin-bottom:6px;
      color:#374151;
      font-size:14px;
      font-weight:700;
    }

    input[type="text"],
    input[type="number"]{
      width:100%;
      min-height:42px;
      padding:10px 11px;
      border:1px solid #cbd5e1;
      border-radius:9px;
      background:#fff;
      color:var(--texto);
      font-size:15px;
      outline:none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus{
      border-color:var(--azul);
      box-shadow:0 0 0 3px rgba(11,58,117,.12);
    }

    .btn{
      min-height:42px;
      padding:10px 14px;
      border:0;
      border-radius:9px;
      background:var(--azul);
      color:#fff;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:hover{
      background:var(--azul-hover);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .btn-secundario{
      background:var(--cinza);
    }

    .btn-secundario:hover{
      background:var(--cinza-hover);
    }

    .btn-perigo{
      background:var(--vermelho);
    }

    .btn-perigo:hover{
      background:var(--vermelho-hover);
    }

    .btn-pequeno{
      min-height:32px;
      padding:7px 9px;
      border-radius:8px;
      font-size:12px;
      flex:0 0 auto;
    }

    .tabela-responsiva{
      width:100%;
      overflow-x:auto;
      border:1px solid var(--borda);
      border-radius:10px;
      -webkit-overflow-scrolling:touch;
    }

    table{
      width:100%;
      min-width:680px;
      border-collapse:collapse;
      background:#fff;
      table-layout:auto;
    }

    thead{
      background:var(--azul);
      color:#fff;
    }

    th,
    td{
      padding:9px 8px;
      border-bottom:1px solid #e5e7eb;
      text-align:left;
      vertical-align:middle;
    }

    th{
      font-size:13px;
      font-weight:700;
    }

    td{
      font-size:14px;
    }

    th:first-child,
    td:first-child{
      width:78px;
      text-align:center;
    }

    th:last-child,
    td:last-child{
      width:280px;
      min-width:280px;
      text-align:center;
    }

    tbody tr:nth-child(even){
      background:#f8fafc;
    }

    tbody tr:hover{
      background:#eef4fb;
    }

    .acoes{
      display:flex;
      flex-wrap:nowrap;
      align-items:center;
      justify-content:center;
      gap:5px;
      white-space:nowrap;
    }

    .vazio{
      padding:26px 12px;
      color:var(--texto-secundario);
      text-align:center;
    }

    #novo{
      display:none;
    }

    #novo.ativo{
      display:block;
    }

    .titulo-formulario{
      margin-bottom:16px;
      font-size:19px;
      font-weight:700;
    }

    .grid-formulario{
      display:grid;
      grid-template-columns:1fr 130px;
      gap:12px;
    }

    .campo-mensagem{
      grid-column:1 / -1;
    }

    .acoes-formulario{
      display:flex;
      flex-wrap:nowrap;
      gap:8px;
      margin-top:16px;
    }

    .estado{
      display:none;
      margin-top:12px;
      padding:10px 12px;
      border-radius:9px;
      font-size:14px;
      font-weight:700;
      text-align:center;
    }

    .estado.visivel{
      display:block;
    }

    .estado.info{
      background:#eff6ff;
      color:#1d4ed8;
    }

    .estado.sucesso{
      background:#ecfdf3;
      color:var(--verde);
    }

    .estado.erro{
      background:#fef3f2;
      color:var(--vermelho);
    }

    .voltar{
      display:block;
      width:100%;
      margin-top:20px;
      padding:12px 20px;
      border-radius:10px;
      background:var(--cinza);
      color:#fff;
      font-size:16px;
      font-weight:700;
      text-align:center;
      text-decoration:none;
    }

    .voltar:hover{
      background:var(--cinza-hover);
    }

    @media(max-width:620px){
      .container{
        padding:12px;
      }

      .topo-sistema{
        justify-content:flex-start;
        padding:16px 14px;
      }

      .topo-sistema img{
        width:64px;
        height:64px;
      }

      .titulo-sistema{
        font-size:16px;
      }

      .subtitulo-sistema{
        font-size:12px;
      }

      .card{
        padding:14px;
      }

      .evento-titulo{
        font-size:15px;
      }

      .evento-detalhes{
        font-size:12px;
      }

      .titulo-pagina{
        font-size:27px;
      }

      .descricao{
        font-size:14px;
      }

      .barra-acoes{
        align-items:stretch;
      }

      .barra-acoes > .btn{
        min-width:max-content;
        padding-left:12px;
        padding-right:12px;
      }

      table{
        min-width:650px;
      }

      th:last-child,
      td:last-child{
        width:270px;
        min-width:270px;
      }

      .btn-pequeno{
        padding:6px 8px;
        font-size:11px;
      }
    }

    @media(max-width:430px){
      .barra-acoes{
        display:grid;
        grid-template-columns:minmax(0,1fr) auto;
        gap:8px;
      }

      .barra-acoes .btn{
        align-self:end;
        font-size:13px;
      }

      .titulo-pagina{
        font-size:25px;
      }

      .grid-formulario{
        grid-template-columns:1fr;
      }

      .campo-mensagem{
        grid-column:auto;
      }

      .acoes-formulario{
        flex-wrap:wrap;
      }
    }

  </style>
</head>

<body>
  <main class="container">

    <header class="topo-sistema">
      <img src="babr.png" alt="Brasão da Base Aérea de Brasília">
      <div>
        <div class="titulo-sistema">SISTEMA DE GERENCIAMENTO DE AGRACIADOS</div>
        <div class="subtitulo-sistema">BASE AÉREA DE BRASÍLIA</div>
      </div>
    </header>

    <section class="card">
      <div id="solenidade" class="evento-titulo">Carregando solenidade...</div>
      <div class="evento-detalhes">
        <div id="dataEvento"></div>
        <div id="localEvento"></div>
      </div>
    </section>

    <section class="card">
      <h1 class="titulo-pagina">Gerenciar Agraciados</h1>
      <p class="descricao">
        Pesquise, inclua, edite, exclua ou altere a posição dos agraciados na lista.
      </p>

      <div class="barra-acoes">
        <div class="campo-pesquisa">
          <label for="pesquisa">Pesquisar</label>
          <input
            type="text"
            id="pesquisa"
            placeholder="Digite o nome..."
            autocomplete="off"
          >
        </div>

        <button id="btnNovo" class="btn" type="button">
          Novo Agraciado
        </button>
      </div>

      <div class="tabela-responsiva">
        <table id="tabela">
          <thead>
            <tr>
              <th>Posição</th>
              <th>Nome</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>

      <div id="estadoLista" class="estado"></div>
    </section>

    <section class="card" id="novo">
      <h2 class="titulo-formulario">Novo Agraciado</h2>

      <div class="grid-formulario">
        <div>
          <label for="nome">Nome</label>
          <input id="nome" type="text" autocomplete="off">
        </div>

        <div>
          <label for="pos">Posição</label>
          <input id="pos" type="number" min="1" step="1">
        </div>

        <div class="campo-mensagem">
          <label for="msg">Mensagem Individual</label>
          <input id="msg" type="text" autocomplete="off">
        </div>
      </div>

      <div class="acoes-formulario">
        <button id="btnInserir" class="btn" type="button">Inserir</button>
        <button id="btnCancelar" class="btn btn-secundario" type="button">Cancelar</button>
      </div>

      <div id="estadoFormulario" class="estado"></div>
    </section>

    <a class="voltar" href="index.html">Voltar ao Menu Principal</a>

  </main>

  <script>
    "use strict";

    const API_URL =
      "https://script.google.com/macros/s/AKfycby_Oeki-w1mFC8VPSPuszOpsRvPVfZ1fuCyvvz1cYkXogwll6jO051eh0R9y3ibWr8A/exec";

    const elementos = {
      solenidade: document.getElementById("solenidade"),
      dataEvento: document.getElementById("dataEvento"),
      localEvento: document.getElementById("localEvento"),
      pesquisa: document.getElementById("pesquisa"),
      tabelaBody: document.getElementById("tb"),
      novo: document.getElementById("novo"),
      nome: document.getElementById("nome"),
      pos: document.getElementById("pos"),
      msg: document.getElementById("msg"),
      btnNovo: document.getElementById("btnNovo"),
      btnInserir: document.getElementById("btnInserir"),
      btnCancelar: document.getElementById("btnCancelar"),
      estadoLista: document.getElementById("estadoLista"),
      estadoFormulario: document.getElementById("estadoFormulario")
    };

    let dados = [];
    let config = {};

    document.addEventListener("DOMContentLoaded", iniciar);

    function iniciar(){
      registrarEventos();
      carregarAgraciados();
    }

    function registrarEventos(){
      elementos.pesquisa.addEventListener("input", filtrar);
      elementos.btnNovo.addEventListener("click", abrirNovo);
      elementos.btnInserir.addEventListener("click", inserir);
      elementos.btnCancelar.addEventListener("click", fecharNovo);
    }

    async function carregarAgraciados(){
      definirEstado(elementos.estadoLista, "Carregando dados...", "info");
      bloquearAcoes(true);

      try{
        const resposta = await fetch(
          API_URL + "?action=dados&_=" + Date.now(),
          {
            method:"GET",
            cache:"no-store"
          }
        );

        if(!resposta.ok){
          throw new Error("Falha HTTP " + resposta.status);
        }

        const json = await resposta.json();

        if(!json.ok){
          throw new Error(json.erro || "Não foi possível carregar os dados.");
        }

        config = json.config || {};

        dados = Array.isArray(json.agraciados)
          ? json.agraciados.sort(
              (a,b) => Number(a["Posição"]) - Number(b["Posição"])
            )
          : [];

        preencherEvento();
        filtrar();
        ocultarEstado(elementos.estadoLista);

      }catch(erro){
        console.error(erro);
        definirEstado(
          elementos.estadoLista,
          "Erro ao carregar os dados.",
          "erro"
        );
      }finally{
        bloquearAcoes(false);
      }
    }

    function preencherEvento(){
      elementos.solenidade.textContent =
        texto(config.Solenidade) || "Solenidade";

      elementos.dataEvento.textContent =
        config.Data ? "Data: " + texto(config.Data) : "";

      elementos.localEvento.textContent =
        config.Local ? "Local: " + texto(config.Local) : "";
    }

    function render(lista){
      elementos.tabelaBody.innerHTML = "";

      if(!lista.length){
        const tr = document.createElement("tr");
        const td = document.createElement("td");

        td.colSpan = 3;
        td.className = "vazio";
        td.textContent = "Nenhum agraciado encontrado.";

        tr.appendChild(td);
        elementos.tabelaBody.appendChild(tr);
        return;
      }

      lista.forEach(a => {
        const tr = document.createElement("tr");

        const tdPosicao = document.createElement("td");
        tdPosicao.textContent = texto(a["Posição"]);

        const tdNome = document.createElement("td");
        tdNome.textContent = texto(a["Nome"]);

        const tdAcoes = document.createElement("td");
        tdAcoes.className = "acoes";

        tdAcoes.appendChild(
          criarBotao("Subir", "btn btn-pequeno", () => subir(a.ID))
        );

        tdAcoes.appendChild(
          criarBotao("Descer", "btn btn-pequeno", () => descer(a.ID))
        );

        tdAcoes.appendChild(
          criarBotao(
            "Editar",
            "btn btn-pequeno btn-secundario",
            () => editar(a.ID)
          )
        );

        tdAcoes.appendChild(
          criarBotao(
            "Excluir",
            "btn btn-pequeno btn-perigo",
            () => excluirAgraciado(a.ID)
          )
        );

        tr.appendChild(tdPosicao);
        tr.appendChild(tdNome);
        tr.appendChild(tdAcoes);

        elementos.tabelaBody.appendChild(tr);
      });
    }

    function criarBotao(rotulo, classe, acao){
      const botao = document.createElement("button");
      botao.type = "button";
      botao.className = classe;
      botao.textContent = rotulo;
      botao.addEventListener("click", acao);
      return botao;
    }

    function filtrar(){
      const termo = elementos.pesquisa.value
        .trim()
        .toLocaleLowerCase("pt-BR");

      const resultado = dados.filter(item =>
        texto(item["Nome"])
          .toLocaleLowerCase("pt-BR")
          .includes(termo)
      );

      render(resultado);
    }

    function abrirNovo(){
      ocultarEstado(elementos.estadoFormulario);

      elementos.nome.value = "";
      elementos.msg.value = "";
      elementos.pos.value = dados.length + 1;

      elementos.novo.classList.add("ativo");

      setTimeout(() => {
        elementos.nome.focus();
        elementos.novo.scrollIntoView({
          behavior:"smooth",
          block:"center"
        });
      }, 50);
    }

    function fecharNovo(){
      elementos.novo.classList.remove("ativo");
      ocultarEstado(elementos.estadoFormulario);
    }

    async function inserir(){
      const nome = elementos.nome.value.trim();
      const posicao = Number(elementos.pos.value);
      const mensagem = elementos.msg.value;

      if(!nome){
        definirEstado(
          elementos.estadoFormulario,
          "Informe o nome.",
          "erro"
        );
        elementos.nome.focus();
        return;
      }

      if(!Number.isFinite(posicao) || posicao < 1){
        definirEstado(
          elementos.estadoFormulario,
          "Informe uma posição válida.",
          "erro"
        );
        elementos.pos.focus();
        return;
      }

      definirEstado(
        elementos.estadoFormulario,
        "Inserindo agraciado...",
        "info"
      );

      bloquearAcoes(true);

      try{
        const json = await enviarPost({
          action:"inserirAgraciado",
          nome:nome,
          posicao:posicao,
          mensagem:mensagem,
          confirmacao:"PENDENTE"
        });

        if(!json.ok){
          throw new Error(json.erro || "Não foi possível inserir.");
        }

        fecharNovo();
        await carregarAgraciados();

      }catch(erro){
        console.error(erro);
        definirEstado(
          elementos.estadoFormulario,
          "Erro ao inserir o agraciado.",
          "erro"
        );
      }finally{
        bloquearAcoes(false);
      }
    }

    async function excluirAgraciado(id){
      if(!confirm("Excluir este agraciado?")){
        return;
      }

      definirEstado(
        elementos.estadoLista,
        "Excluindo agraciado...",
        "info"
      );

      bloquearAcoes(true);

      try{
        const json = await enviarPost({
          action:"excluirAgraciado",
          id:id
        });

        if(!json.ok){
          throw new Error(json.erro || "Não foi possível excluir.");
        }

        await carregarAgraciados();

      }catch(erro){
        console.error(erro);
        definirEstado(
          elementos.estadoLista,
          "Erro ao excluir o agraciado.",
          "erro"
        );
      }finally{
        bloquearAcoes(false);
      }
    }

    async function editar(id){
      const agraciado = dados.find(item => String(item.ID) === String(id));

      if(!agraciado){
        return;
      }

      const novoNome = prompt(
        "Nome:",
        texto(agraciado["Nome"])
      );

      if(novoNome === null){
        return;
      }

      if(!novoNome.trim()){
        alert("Informe o nome.");
        return;
      }

      const novaMensagem = prompt(
        "Mensagem Individual:",
        texto(agraciado["Mensagem Individual"])
      );

      if(novaMensagem === null){
        return;
      }

      definirEstado(
        elementos.estadoLista,
        "Atualizando agraciado...",
        "info"
      );

      bloquearAcoes(true);

      try{
        const json = await enviarPost({
          action:"editarAgraciado",
          id:id,
          nome:novoNome.trim(),
          mensagem:novaMensagem
        });

        if(!json.ok){
          throw new Error(json.erro || "Não foi possível atualizar.");
        }

        await carregarAgraciados();

      }catch(erro){
        console.error(erro);
        definirEstado(
          elementos.estadoLista,
          "Erro ao editar o agraciado.",
          "erro"
        );
      }finally{
        bloquearAcoes(false);
      }
    }

    async function subir(id){
      const agraciado = dados.find(item => String(item.ID) === String(id));

      if(!agraciado){
        return;
      }

      const posicaoAtual = Number(agraciado["Posição"]);

      if(posicaoAtual <= 1){
        return;
      }

      await mover(id, posicaoAtual - 1);
    }

    async function descer(id){
      const agraciado = dados.find(item => String(item.ID) === String(id));

      if(!agraciado){
        return;
      }

      const posicaoAtual = Number(agraciado["Posição"]);

      if(posicaoAtual >= dados.length){
        return;
      }

      await mover(id, posicaoAtual + 1);
    }

    async function mover(id, novaPosicao){
      definirEstado(
        elementos.estadoLista,
        "Alterando posição...",
        "info"
      );

      bloquearAcoes(true);

      try{
        const json = await enviarPost({
          action:"moverAgraciado",
          id:id,
          novaPosicao:novaPosicao
        });

        if(!json.ok){
          throw new Error(json.erro || "Não foi possível alterar a posição.");
        }

        await carregarAgraciados();

      }catch(erro){
        console.error(erro);
        definirEstado(
          elementos.estadoLista,
          "Erro ao alterar a posição.",
          "erro"
        );
      }finally{
        bloquearAcoes(false);
      }
    }

    async function enviarPost(conteudo){
      const resposta = await fetch(API_URL, {
        method:"POST",
        headers:{
          "Content-Type":"text/plain;charset=utf-8"
        },
        body:JSON.stringify(conteudo)
      });

      if(!resposta.ok){
        throw new Error("Falha HTTP " + resposta.status);
      }

      return resposta.json();
    }

    function bloquearAcoes(bloquear){
      elementos.btnNovo.disabled = bloquear;
      elementos.btnInserir.disabled = bloquear;
      elementos.btnCancelar.disabled = bloquear;

      document
        .querySelectorAll(".acoes button")
        .forEach(botao => {
          botao.disabled = bloquear;
        });
    }

    function definirEstado(elemento, mensagem, tipo){
      elemento.textContent = mensagem;
      elemento.className = "estado visivel " + tipo;
    }

    function ocultarEstado(elemento){
      elemento.textContent = "";
      elemento.className = "estado";
    }

    function texto(valor){
      return valor === null || valor === undefined
        ? ""
        : String(valor).trim();
    }
  </script>
</body>
</html>
