<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerenciar Agraciados</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f5f8;margin:0;color:#1f2937}
.container{max-width:900px;margin:auto;padding:16px}
.topo{background:#071b33;color:#fff;padding:18px;border-radius:16px;text-align:center;font-size:22px;font-weight:bold}
.card{background:#fff;border-radius:14px;padding:16px;margin-top:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
input[type=text],input[type=number]{width:100%;padding:8px;box-sizing:border-box}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{border:1px solid #ddd;padding:8px}
button{background:#0b3a75;color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer}
.acoes button{margin-right:4px}
#novo{display:none}
</style>
</head>
<body>
<div class="container">
<div class="topo">GERENCIAR AGRACIADOS</div>

<div class="card">
<label>Pesquisar</label>
<input type="text" id="pesquisa" placeholder="Digite o nome..." onkeyup="filtrar()">
</div>

<div class="card">
<button onclick="abrirNovo()">+ Novo Agraciado</button>

<table id="tabela">
<thead>
<tr><th>Posição</th><th>Nome</th><th>Ações</th></tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div class="card" id="novo">
<h3>Novo Agraciado</h3>
<label>Nome</label>
<input id="nome" type="text">
<label>Posição</label>
<input id="pos" type="number">
<label>Mensagem Individual</label>
<input id="msg" type="text">
<br><br>
<button onclick="inserir()">
Inserir
</button>
<button onclick="fecharNovo()">Cancelar</button>
</div>
</div>

<script>
    
const API_URL =
"https://script.google.com/macros/s/AKfycby_Oeki-w1mFC8VPSPuszOpsRvPVfZ1fuCyvvz1cYkXogwll6jO051eh0R9y3ibWr8A/exec";

let dados=[];

async function carregarAgraciados(){

    try{

        const r=await fetch(API_URL+"?action=dados&_="+Date.now());

        const json=await r.json();

        dados=json.agraciados.sort((a,b)=>
            Number(a["Posição"])-Number(b["Posição"])
        );

        render(dados);

    }catch(e){

        alert("Erro ao carregar dados.");

        console.log(e);

    }

}

window.onload=carregarAgraciados;

function render(lista){

    const tbody=document.getElementById("tb");

    tbody.innerHTML="";

    lista.forEach(a=>{

        tbody.innerHTML+=`

        <tr>

        <td>${a["Posição"]}</td>

        <td>${a["Nome"]}</td>

        <td class="acoes">

        <button onclick="subir('${a.ID}')">▲</button>

        <button onclick="descer('${a.ID}')">▼</button>

        <button onclick="editar('${a.ID}')">✎</button>

        <button onclick="excluirAgraciado('${a.ID}')">🗑</button>

        </td>

        </tr>

        `;

    });

}

function filtrar(){

    const texto=document
        .getElementById("pesquisa")
        .value
        .toLowerCase();

    render(

        dados.filter(x=>

            x["Nome"]
            .toLowerCase()
            .includes(texto)

        )

    );

}

function abrirNovo(){

    document.getElementById("novo").style.display="block";

    document.getElementById("nome").value="";

    document.getElementById("msg").value="";

    document.getElementById("pos").value=dados.length+1;

}

function fecharNovo(){

    document.getElementById("novo").style.display="none";

}

async function inserir(){

    const nome=document.getElementById("nome").value.trim();

    const pos=document.getElementById("pos").value;

    const msg=document.getElementById("msg").value;

    if(nome==""){

        alert("Informe o nome.");

        return;

    }

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"inserirAgraciado",

            nome:nome,

            posicao:Number(pos),

            mensagem:msg,

            confirmacao:"PENDENTE"

        })

    });

    fecharNovo();

    carregarAgraciados();

}

async function excluirAgraciado(id){

    if(!confirm("Excluir este agraciado?"))

        return;

    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"excluirAgraciado",

            id:id

        })

    });

    carregarAgraciados();

}

function editar(id){

    const a=dados.find(x=>x.ID==id);

    if(!a)return;

    const novoNome=prompt("Nome:",a["Nome"]);

    if(novoNome===null)return;

    const novaMensagem=prompt(

        "Mensagem Individual:",

        a["Mensagem Individual"]||""

    );

    fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"editarAgraciado",

            id:id,

            nome:novoNome,

            mensagem:novaMensagem

        })

    }).then(()=>carregarAgraciados());

}

function subir(id){

    const a=dados.find(x=>x.ID==id);

    if(!a)return;

    if(a["Posição"]==1)return;

    fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"moverAgraciado",

            id:id,

            novaPosicao:Number(a["Posição"])-1

        })

    }).then(()=>carregarAgraciados());

}

function descer(id){

    const a=dados.find(x=>x.ID==id);

    if(!a)return;

    fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"moverAgraciado",

            id:id,

            novaPosicao:Number(a["Posição"])+1

        })

    }).then(()=>carregarAgraciados());

}
</script>
</body>
</html>
