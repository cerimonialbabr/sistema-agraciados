<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Sistema de Gerenciamento de Agraciados</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#08111f;
    margin:0;
    color:white;
    overflow:hidden;
}

.container{
    width:100vw;
    height:100vh;
    margin:0;
    padding:14px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
}

/* CABEÇALHO */

.header{
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:18px;
    align-items:center;
    background:#0b1f3a;
    border-radius:18px;
    padding:12px 20px;
    flex-shrink:0;
}

.header img{
    width:72px;
    height:72px;
    object-fit:contain;
}

.titulo{
    font-size:26px;
    font-weight:900;
}

.subtitulo{
    color:#bfdbfe;
    font-size:15px;
    font-weight:700;
}

.formatura{
    text-align:right;
    color:#dbeafe;
    font-size:14px;
    line-height:1.35;
}

/* CONTADORES */

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin:12px 0;
    flex-shrink:0;
}

.card{
    background:#10233f;
    border:1px solid #1d4ed8;
    border-radius:16px;
    padding:8px;
    text-align:center;
}

.label{
    color:#cbd5e1;
    font-weight:bold;
    font-size:13px;
}

.numero{
    font-size:36px;
    font-weight:900;
    color:#38bdf8;
}

/* ESTRUTURA PRINCIPAL */

.main{
    display:grid;
    grid-template-columns:1fr 330px;
    gap:12px;
    flex:1;
    min-height:0;
}

.area-esquerda{
    display:flex;
    flex-direction:column;
    min-height:0;
}

.mapa{
    background:#0f172a;
    border-radius:18px;
    padding:14px;
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
}

.titulo-dispositivo{
    text-align:center;
    color:#e0f2fe;
    font-size:22px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:8px;
    flex-shrink:0;
}

.referencia-box{
    text-align:center;
    color:#cbd5e1;
    font-weight:900;
    letter-spacing:2px;
    border:1px solid rgba(255,255,255,.18);
    border-radius:12px;
    padding:6px;
    margin:6px auto;
    width:220px;
    background:#10233f;
    flex-shrink:0;
}

.area-dispositivo{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    min-height:0;
}

.grade-dispositivo{
    display:flex;
    flex-direction:column;
    gap:var(--gap-linhas,10px);
    align-items:center;
    justify-content:center;
}

.linha-global{
    display:flex;
    gap:var(--gap-blocos,42px);
    justify-content:center;
    align-items:center;
}

.bloco-linha{
    display:flex;
    gap:var(--gap-circulos,7px);
}

.circulo{
    width:var(--circle-size,42px);
    height:var(--circle-size,42px);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:calc(var(--circle-size,42px) * .34);
    border:3px solid rgba(255,255,255,.25);
    box-shadow:0 3px 10px rgba(0,0,0,.4);
    box-sizing:border-box;
}

.circulo.vazio{
    visibility:hidden;
}

.presente{
    background:#16a34a;
}

.pendente{
    background:#dc2626;
}

.legenda{
    display:flex;
    justify-content:center;
    gap:18px;
    color:#cbd5e1;
    font-size:13px;
    margin-top:6px;
    flex-shrink:0;
}

.bolinha{
    width:13px;
    height:13px;
    border-radius:50%;
    display:inline-block;
    margin-right:6px;
}

.verde{background:#16a34a;}
.vermelha{background:#dc2626;}

.atualizacao{
    text-align:center;
    color:#94a3b8;
    font-size:12px;
    margin-top:6px;
    flex-shrink:0;
}

/* PAINÉIS */

.lateral{
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:0;
}

.painel{
    background:#10233f;
    border-radius:16px;
    padding:12px;
}

.painel h2{
    margin:0 0 8px;
    text-align:center;
    color:#bfdbfe;
    font-size:18px;
}

.linha{
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,.12);
    font-size:13px;
}

.linha:last-child{
    border-bottom:none;
}

.hora{
    color:#93c5fd;
    font-size:11px;
}

.orientacao{
    background:#0f172a;
    border-left:4px solid #38bdf8;
    padding:8px;
    border-radius:8px;
    margin-bottom:8px;
    font-size:13px;
}

.listas-baixo{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:12px;
    height:25vh;
    min-height:150px;
}

.lista-scroll{
    max-height:100%;
    overflow-y:auto;
}

.nome-presente{
    color:#86efac;
    font-weight:bold;
}

.nome-pendente{
    color:#fca5a5;
    font-weight:bold;
}

.voltar{
    display:block;
    text-align:center;
    background:#334155;
    color:white;
    text-decoration:none;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
    flex-shrink:0;
}

/* RESPONSIVO */

@media(max-width:1100px){
    body{
        overflow:auto;
    }

    .container{
        height:auto;
    }

    .main{
        grid-template-columns:1fr;
    }

    .header{
        grid-template-columns:auto 1fr;
    }

    .formatura{
        grid-column:1 / -1;
        text-align:left;
    }

    .listas-baixo{
        height:auto;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="babr.png" alt="Logo BABR">

        <div>
            <div class="titulo">SISTEMA DE GERENCIAMENTO DE AGRACIADOS</div>
            <div class="subtitulo">BASE AÉREA DE BRASÍLIA</div>
        </div>

        <div class="formatura">
            <strong id="solenidade">Carregando solenidade...</strong><br>
            <span id="dataFormatura"></span><br>
            <span id="localFormatura"></span>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <div class="label">Total de Agraciados</div>
            <div class="numero" id="total">0</div>
        </div>

        <div class="card">
            <div class="label">Presentes</div>
            <div class="numero" id="presentes">0</div>
        </div>

        <div class="card">
            <div class="label">Pendentes</div>
            <div class="numero" id="pendentes">0</div>
        </div>
    </div>

    <div class="main">

        <div class="area-esquerda">

            <div class="mapa">
                <div class="titulo-dispositivo">DISPOSITIVO</div>

                <div class="referencia-box" id="tituloSuperior">TRIBUNA</div>

                <div class="area-dispositivo">
                    <div class="grade-dispositivo" id="gradeDispositivo"></div>
                </div>

                <div class="referencia-box" id="tituloInferior">TROPA</div>

                <div class="legenda">
                    <span><i class="bolinha verde"></i>Presente</span>
                    <span><i class="bolinha vermelha"></i>Pendente</span>
                </div>

                <div class="atualizacao" id="atualizacao"></div>
            </div>

            <div class="listas-baixo">
                <div class="painel">
                    <h2>Presentes</h2>
                    <div class="lista-scroll" id="listaPresentes"></div>
                </div>

                <div class="painel">
                    <h2>Faltantes</h2>
                    <div class="lista-scroll" id="listaPendentes"></div>
                </div>
            </div>

        </div>

        <div class="lateral">
            <div class="painel">
                <h2>Últimos Check-ins</h2>
                <div id="ultimosCheckins"></div>
            </div>

            <div class="painel">
                <h2>Orientações</h2>
                <div id="orientacoes"></div>
            </div>

            <a href="index.html" class="voltar">Voltar ao Menu Principal</a>
        </div>

    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzI_OV6JrjfMqg2aevAVP_2SGGmww6vk6mEiE7COmr3dQabG3YtGfHpswEiP6f-kqk9/exec";

async function carregarDashboard(){
    try{
        const resposta = await fetch(API_URL + "?action=dados&_=" + Date.now());
        const dados = await resposta.json();

        const config = dados.config || {};
        const layout = dados.layout || {};
        const agraciados = dados.agraciados || [];
        const checkins = dados.checkins || [];

        document.getElementById("solenidade").innerText =
            config["Solenidade"] || "Solenidade não informada";

        document.getElementById("dataFormatura").innerText =
            config["Data"] ? "Data: " + config["Data"] : "";

        document.getElementById("localFormatura").innerText =
            config["Local"] ? "Local: " + config["Local"] : "";

        document.getElementById("tituloSuperior").innerText =
            layout["Titulo_Superior"] || "TRIBUNA";

        document.getElementById("tituloInferior").innerText =
            layout["Titulo_Inferior"] || "TROPA";

        const total = Number(layout["Total_Agraciados"]) || agraciados.length;

        const presentesLista = agraciados
            .filter(a => a.Status === "PRESENTE")
            .sort((a,b)=>Number(a.Posição)-Number(b.Posição));

        const pendentesLista = agraciados
            .filter(a => a.Status !== "PRESENTE")
            .sort((a,b)=>Number(a.Posição)-Number(b.Posição));

        document.getElementById("total").innerText = total;
        document.getElementById("presentes").innerText = presentesLista.length;
        document.getElementById("pendentes").innerText = total - presentesLista.length;

        gerarMapa(layout, agraciados, total);
        gerarCheckins(checkins);
        gerarOrientacoes(layout);
        renderLista("listaPresentes", presentesLista, "nome-presente");
        renderLista("listaPendentes", pendentesLista, "nome-pendente");

        document.getElementById("atualizacao").innerText =
            "Atualizado às " + new Date().toLocaleTimeString("pt-BR") +
            " | Atualização automática a cada 5 segundos";

    }catch(e){
        console.error(e);
    }
}

function gerarMapa(layout, agraciados, total){
    const qtdBlocos = Number(layout["Quantidade_Blocos"]) || 1;
    const linhas = Number(layout["Linhas_Por_Bloco"]) || 1;
    const colunas = Number(layout["Colunas_Por_Bloco"]) || total;

    const capacidadeBloco = linhas * colunas;

    const statusPorPosicao = {};
    agraciados.forEach(a => {
        statusPorPosicao[Number(a["Posição"])] = a.Status;
    });

    const grade = document.getElementById("gradeDispositivo");
    grade.innerHTML = "";

    const tamanho = calcularTamanhoCirculo(qtdBlocos, linhas, colunas);

    grade.style.setProperty("--circle-size", tamanho + "px");
    grade.style.setProperty("--gap-circulos", Math.max(4, Math.floor(tamanho * 0.18)) + "px");
    grade.style.setProperty("--gap-linhas", Math.max(5, Math.floor(tamanho * 0.22)) + "px");
    grade.style.setProperty("--gap-blocos", Math.max(24, Math.floor(tamanho * 0.9)) + "px");

    for(let linha = 0; linha < linhas; linha++){

        const linhaGlobal = document.createElement("div");
        linhaGlobal.className = "linha-global";

        for(let bloco = qtdBlocos; bloco >= 1; bloco--){

            const blocoLinha = document.createElement("div");
            blocoLinha.className = "bloco-linha";

            const inicioBloco = ((bloco - 1) * capacidadeBloco) + 1;
            const inicioLinha = inicioBloco + (linha * colunas);
            const fimLinha = inicioLinha + colunas - 1;

            for(let posicao = fimLinha; posicao >= inicioLinha; posicao--){

                const circulo = document.createElement("div");
                circulo.className = "circulo";

                if(posicao > total){
                    circulo.classList.add("vazio");
                    circulo.innerText = "";
                }else{
                    if(statusPorPosicao[posicao] === "PRESENTE"){
                        circulo.classList.add("presente");
                    }else{
                        circulo.classList.add("pendente");
                    }

                    circulo.innerText = posicao;
                }

                blocoLinha.appendChild(circulo);
            }

            linhaGlobal.appendChild(blocoLinha);
        }

        grade.appendChild(linhaGlobal);
    }
}

function calcularTamanhoCirculo(qtdBlocos, linhas, colunas){
    const area = document.querySelector(".area-dispositivo");

    const largura = area.clientWidth * 0.94;
    const altura = area.clientHeight * 0.86;

    const totalColunas = qtdBlocos * colunas;
    const folgaBlocos = qtdBlocos > 1 ? qtdBlocos * 1.2 : 1;

    const tamanhoPorLargura = largura / (totalColunas + folgaBlocos);
    const tamanhoPorAltura = altura / (linhas * 1.35);

    let tamanho = Math.floor(Math.min(tamanhoPorLargura, tamanhoPorAltura));

    if(tamanho > 54) tamanho = 54;
    if(tamanho < 18) tamanho = 18;

    return tamanho;
}

function gerarCheckins(checkins){
    const div = document.getElementById("ultimosCheckins");
    div.innerHTML = "";

    if(!checkins.length){
        div.innerHTML = "<div class='linha'>Nenhum check-in registrado.</div>";
        return;
    }

    checkins
        .slice()
        .reverse()
        .slice(0,10)
        .forEach(c => {
            const linha = document.createElement("div");
            linha.className = "linha";

            let hora = c["Hora"];

            if(hora && String(hora).includes("T")){
                hora = new Date(hora).toLocaleTimeString("pt-BR");
            }

            linha.innerHTML =
                "<strong>Pos " + c["Posição"] + " - " + c["Nome"] + "</strong><br>" +
                "<span class='hora'>" + (hora || "") + "</span>";

            div.appendChild(linha);
        });
}

function gerarOrientacoes(layout){
    const div = document.getElementById("orientacoes");
    div.innerHTML = "";

    Object.keys(layout)
        .filter(k => String(k).startsWith("Orientacao_"))
        .sort()
        .forEach(k => {
            if(layout[k]){
                const item = document.createElement("div");
                item.className = "orientacao";
                item.innerText = layout[k];
                div.appendChild(item);
            }
        });

    if(div.innerHTML === ""){
        div.innerHTML = "<div class='linha'>Nenhuma orientação cadastrada.</div>";
    }
}

function renderLista(id, lista, classe){
    const div = document.getElementById(id);
    div.innerHTML = "";

    if(!lista.length){
        div.innerHTML = "<div class='linha'>Nenhum registro.</div>";
        return;
    }

    lista.forEach(a => {
        const item = document.createElement("div");
        item.className = "linha " + classe;
        item.innerText = "Pos " + a.Posição + " - " + a.Nome;
        div.appendChild(item);
    });
}

carregarDashboard();
setInterval(carregarDashboard, 5000);

window.addEventListener("resize", () => {
    carregarDashboard();
});
</script>

</body>
</html>
