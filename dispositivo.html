<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>Editor do Dispositivo</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Inter,sans-serif;
    background:#eef2f7;
    color:#1f2937;

}

.container{

    width:min(1450px,96%);
    margin:auto;
    padding:18px;

}

.card{

    background:white;

    border-radius:16px;

    padding:20px;

    margin-bottom:18px;

    box-shadow:0 4px 14px rgba(0,0,0,.08);

}

header{

    background:#071b33;

    color:white;

    border-radius:16px;

    padding:18px;

    display:flex;

    align-items:center;

    gap:18px;

    margin-bottom:18px;

}

header img{

    width:74px;

}

header h1{

    font-size:24px;

    margin-bottom:4px;

}

header h2{

    font-size:15px;

    font-weight:600;

    color:#d9e7ff;

}

.infoEvento{

    display:grid;

    grid-template-columns:1fr;

    gap:6px;

}

.infoEvento strong{

    font-size:28px;

    color:#0b3a75;

}

h3{

    text-align:center;

    font-size:42px;

    color:#1f2937;

    margin-bottom:18px;

}

.texto{

    text-align:center;

    font-size:20px;

    color:#4b5563;

    margin-bottom:28px;

    line-height:1.5;

}

.modos{

    display:flex;

    justify-content:center;

    gap:60px;

    margin-bottom:30px;

}

.modos label{

    font-size:28px;

    font-weight:700;

    cursor:pointer;

}

.config{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:18px;

}

.config label{

    display:block;

    font-weight:700;

    margin-bottom:8px;

}

.config input{

    width:100%;

    padding:14px;

    border:1px solid #d5d8df;

    border-radius:12px;

    font-size:17px;

}

button{

    background:#123f7c;

    color:white;

    border:none;

    border-radius:12px;

    padding:14px 22px;

    cursor:pointer;

    font-size:17px;

    font-weight:700;

}

button:hover{

    background:#0b2f5f;

}

#areaManual{

    display:none;

}

.table-wrapper{

    overflow:auto;

}

table{

    width:100%;

    border-collapse:collapse;

    min-width:900px;

}

thead{

    background:#123f7c;

    color:white;

}

th{

    padding:14px;

}

td{

    border:1px solid #e5e7eb;

    padding:8px;

    text-align:center;

}

td input{

    width:100%;

    padding:8px;

}

.acoes{

    display:flex;

    justify-content:center;

    gap:6px;

}

.preview{

    background:#fafafa;

    border:2px dashed #cdd9ea;

    border-radius:14px;

    padding:22px;

    overflow:auto;

    min-height:350px;

}

#previewDispositivo{

    display:flex;

    justify-content:center;

}

.dispositivo{

    display:flex;

    gap:42px;

    align-items:flex-start;

}

.bloco{

    display:flex;

    flex-direction:column;

    gap:10px;

}

.fileira{

    display:flex;

    gap:10px;

}

.posicao{

    width:42px;

    height:42px;

    border-radius:50%;

    border:2px solid #6b7280;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:14px;

    font-weight:700;

    background:white;

}

.tituloSuperior{

    text-align:center;

    font-weight:800;

    font-size:24px;

    margin-bottom:18px;

}

.tituloInferior{

    text-align:center;

    font-weight:800;

    font-size:24px;

    margin-top:18px;

}

.voltar{

    text-align:center;

    margin-top:18px;

}

.voltar a{

    text-decoration:none;

    background:#6b7280;

    color:white;

    padding:12px 22px;

    border-radius:10px;

    font-weight:700;

}

@media(max-width:900px){

.config{

grid-template-columns:1fr;

}

.modos{

flex-direction:column;

gap:18px;

align-items:flex-start;

}

}

</style>

</head>

<body>

<div class="container">

<header>

<img src="babr.png">

<div>

<h1>SISTEMA DE GERENCIAMENTO DE AGRACIADOS</h1>

<h2>BASE AÉREA DE BRASÍLIA</h2>

</div>

</header>

<div class="card">

<div class="infoEvento">

<strong id="tituloEvento"></strong>

<div id="dataEvento"></div>

<div id="localEvento"></div>

</div>

</div>

<div class="card">

<h3>EDITOR DO DISPOSITIVO</h3>

<div class="texto">

Nesta página é possível configurar completamente o dispositivo utilizado em todas as telas do sistema.

</div>

<div class="modos">

<label>

<input
type="radio"
name="modo"
id="modoAutomatico">

Modo Automático

</label>

<label>

<input
type="radio"
name="modo"
id="modoManual">

Modo Manual

</label>

</div>

<div class="config">

<div>

<label>Total de Agraciados</label>

<input
id="Total_Agraciados"
type="number">

</div>

<div>

<label>Quantidade de Blocos</label>

<input
id="Quantidade_Blocos"
type="number">

</div>

<div>

<label>Linhas por Bloco</label>

<input
id="Linhas_Por_Bloco"
type="number">

</div>

<div>

<label>Colunas por Bloco</label>

<input
id="Colunas_Por_Bloco"
type="number">

</div>

<div>

<label>Título Superior</label>

<input
id="Titulo_Superior"
type="text">

</div>

<div>

<label>Título Inferior</label>

<input
id="Titulo_Inferior"
type="text">

</div>

</div>

    <div
id="areaManual"
class="card">

<div
style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;">

<h2>Layout Manual</h2>

<div>

<button
id="btnNovaLinha">

Nova Fileira

</button>

</div>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th style="width:80px;">
Ordem
</th>

<th style="width:120px;">
Bloco
</th>

<th style="width:120px;">
Fileira
</th>

<th style="width:160px;">
Posições
</th>

<th style="width:220px;">
Ações
</th>

</tr>

</thead>

<tbody id="tbodyLayout">

</tbody>

</table>

</div>

</div>

<div class="card">

<h2
style="
text-align:center;
margin-bottom:20px;">

Pré-visualização

</h2>

<div
class="preview">

<div id="previewDispositivo">

</div>

</div>

</div>

<div
class="card"
style="
text-align:center;">

<button
id="btnSalvar">

Salvar Alterações

</button>

</div>

<div class="voltar">

<a href="index.html">

Voltar ao Menu Principal

</a>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby_Oeki-w1mFC8VPSPuszOpsRvPVfZ1fuCyvvz1cYkXogwll6jO051eh0R9y3ibWr8A/exec";

let dados={};

let config={};

let layout=[];

document.addEventListener(

"DOMContentLoaded",

inicializar

);

async function inicializar(){

await carregar();

registrarEventos();

}

async function carregar(){

const resposta=

await fetch(

API_URL+

"?action=dados&_="+

Date.now()

);

dados=

await resposta.json();

config=dados.config||{};

layout=dados.layout||[];

preencherCampos();

renderTabela();

desenharPreview();

}

function preencherCampos(){

tituloEvento.innerHTML=

config.Solenidade||"";

dataEvento.innerHTML=

config.Data
?

"Data: "+config.Data

:"";

localEvento.innerHTML=

config.Local
?

"Local: "+config.Local

:"";

Total_Agraciados.value=

config.Total_Agraciados||"";

Quantidade_Blocos.value=

config.Quantidade_Blocos||1;

Linhas_Por_Bloco.value=

config.Linhas_Por_Bloco||1;

Colunas_Por_Bloco.value=

config.Colunas_Por_Bloco||1;

Titulo_Superior.value=

config.Titulo_Superior||"";

Titulo_Inferior.value=

config.Titulo_Inferior||"";

const modo=

String(

config.Modo_Layout||

"AUTOMATICO"

);

if(

modo=="MANUAL"

){

modoManual.checked=true;

areaManual.style.display="block";

}else{

modoAutomatico.checked=true;

areaManual.style.display="none";

}

}

    function registrarEventos(){

modoAutomatico.addEventListener(

"change",

()=>{

areaManual.style.display="none";

desenharPreview();

}

);

modoManual.addEventListener(

"change",

()=>{

areaManual.style.display="block";

desenharPreview();

}

);

[
Total_Agraciados,
Quantidade_Blocos,
Linhas_Por_Bloco,
Colunas_Por_Bloco,
Titulo_Superior,
Titulo_Inferior
].forEach(campo=>{

campo.addEventListener(

"input",

desenharPreview

);

});

btnNovaLinha.addEventListener(

"click",

novaLinha

);

btnSalvar.addEventListener(

"click",

salvar

);

}

function renderTabela(){

tbodyLayout.innerHTML="";

layout

.sort(

(a,b)=>

Number(a.Ordem)-

Number(b.Ordem)

)

.forEach((linha,indice)=>{

tbodyLayout.innerHTML+=`

<tr>

<td>

${linha.Ordem}

</td>

<td>

<input

value="${linha.Bloco}"

oninput="editarBloco(${indice},this.value)">

</td>

<td>

<input

type="number"

value="${linha.Fileira}"

oninput="editarFileira(${indice},this.value)">

</td>

<td>

<input

type="number"

value="${

linha["Posições"]

||

linha.Posicoes

}"

oninput="editarPosicoes(${indice},this.value)">

</td>

<td>

<div class="acoes">

<button

onclick="subir(${indice})">

▲

</button>

<button

onclick="descer(${indice})">

▼

</button>

<button

onclick="duplicar(${indice})">

Duplicar

</button>

<button

onclick="excluir(${indice})">

Excluir

</button>

</div>

</td>

</tr>

`;

});

}

function editarBloco(i,v){

layout[i].Bloco=v.toUpperCase();

desenharPreview();

}

function editarFileira(i,v){

layout[i].Fileira=

Number(v);

desenharPreview();

}

function editarPosicoes(i,v){

layout[i]["Posições"]=

Number(v);

layout[i].Posicoes=

Number(v);

desenharPreview();

}

function novaLinha(){

layout.push({

Ordem:

layout.length+1,

Bloco:"A",

Fileira:1,

"Posições":10

});

renderTabela();

desenharPreview();

}

function subir(i){

if(i==0)return;

[

layout[i],

layout[i-1]

]=[

layout[i-1],

layout[i]

];

renumerar();

renderTabela();

desenharPreview();

}

function descer(i){

if(i>=layout.length-1)return;

[

layout[i],

layout[i+1]

]=[

layout[i+1],

layout[i]

];

renumerar();

renderTabela();

desenharPreview();

}

function duplicar(i){

layout.splice(

i+1,

0,

structuredClone(

layout[i]

function desenharPreview(){

previewDispositivo.innerHTML="";

const tituloSup=

Titulo_Superior.value;

const tituloInf=

Titulo_Inferior.value;

let html="";

if(tituloSup){

html+=`

<div class="tituloSuperior">

${tituloSup}

</div>

`;

}

html+=`

<div class="dispositivo">

`;

if(modoAutomatico.checked){

const blocos=

Number(

Quantidade_Blocos.value

);

const linhas=

Number(

Linhas_Por_Bloco.value

);

const colunas=

Number(

Colunas_Por_Bloco.value

);

const total=

Number(

Total_Agraciados.value

);

let numero=1;

for(

let b=0;

b<blocos;

b++

){

html+=`

<div class="bloco">

`;

for(

let l=0;

l<linhas;

l++

){

html+=`

<div class="fileira">

`;

for(

let c=0;

c<colunas;

c++

){

if(numero<=total){

html+=`

<div class="posicao">

${numero}

</div>

`;

numero++;

}else{

html+=`

<div class="posicao">

&nbsp;

</div>

`;

}

}

html+=`

</div>

`;

}

html+=`

</div>

`;

}

}else{

const grupos={};

layout.forEach(l=>{

if(!grupos[l.Bloco])

grupos[l.Bloco]=[];

grupos[l.Bloco].push(l);

});

let numero=1;

const total=

Number(

Total_Agraciados.value

);

Object.keys(grupos)

.sort()

.forEach(bloco=>{

html+=`

<div class="bloco">

`;

grupos[bloco]

.sort(

(a,b)=>

Number(a.Fileira)-

Number(b.Fileira)

)

.forEach(fileira=>{

html+=`

<div class="fileira">

`;

const qtd=

Number(

fileira["Posições"]

||

fileira.Posicoes

);

for(

let i=0;

i<qtd;

i++

){

if(numero<=total){

html+=`

<div class="posicao">

${numero}

</div>

`;

numero++;

}else{

html+=`

<div class="posicao">

&nbsp;

</div>

`;

}

}

html+=`

</div>

`;

});

html+=`

</div>

`;

});

}

html+=`

</div>

`;

if(tituloInf){

html+=`

<div class="tituloInferior">

${tituloInf}

</div>

`;

}

previewDispositivo.innerHTML=

html;

}

    function calcularTotalLayout(){

let total=0;

layout.forEach(l=>{

total+=Number(

l["Posições"]

||

l.Posicoes

||

0

);

});

return total;

}

async function salvar(){

const modo=

modoAutomatico.checked

?

"AUTOMATICO"

:

"MANUAL";

const configSalvar={

Modo_Layout:modo,

Total_Agraciados:Number(

Total_Agraciados.value

),

Quantidade_Blocos:Number(

Quantidade_Blocos.value

),

Linhas_Por_Bloco:Number(

Linhas_Por_Bloco.value

),

Colunas_Por_Bloco:Number(

Colunas_Por_Bloco.value

),

Titulo_Superior:

Titulo_Superior.value,

Titulo_Inferior:

Titulo_Inferior.value

};

if(modo=="MANUAL"){

configSalvar.Total_Agraciados=

calcularTotalLayout();

Total_Agraciados.value=

configSalvar.Total_Agraciados;

}

const resposta=

await fetch(

API_URL,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

action:"salvarDispositivo",

modo:modo,

config:configSalvar,

layout:layout

})

}

);

const json=

await resposta.json();

if(!json.ok){

alert(

json.erro||

"Erro ao salvar."

);

return;

}

await carregar();

alert(

"Dispositivo salvo com sucesso."

);

}

window.editarBloco=

editarBloco;

window.editarFileira=

editarFileira;

window.editarPosicoes=

editarPosicoes;

window.subir=

subir;

window.descer=

descer;

window.duplicar=

duplicar;

window.excluir=

excluir;

</script>

</body>

</html>
