<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Editor do Dispositivo</title>
<style>
body{font-family:Arial;background:#f3f5f8;margin:0}.container{max-width:980px;margin:auto;padding:16px}.topo-sistema{display:flex;align-items:center;justify-content:center;gap:18px;background:#071b33;border-radius:16px;padding:20px;color:#fff}.card,.caixa-formatura{background:#fff;border-radius:14px;padding:16px;margin:16px 0;box-shadow:0 4px 12px rgba(0,0,0,.08)}table{width:100%;border-collapse:collapse}th{background:#0b3a75;color:#fff;padding:8px}td{padding:8px;border-bottom:1px solid #ddd}input,select{width:100%;padding:8px;box-sizing:border-box}button{padding:10px 16px;background:#0b3a75;color:#fff;border:none;border-radius:8px;margin:4px;cursor:pointer}
</style></head>
<body>
<div class="container">
<div class="topo-sistema"><div><h2>SISTEMA DE GERENCIAMENTO DE AGRACIADOS</h2><div>BASE AÉREA DE BRASÍLIA</div></div></div>
<div class="caixa-formatura"><div id="solenidade">Carregando solenidade...</div><div id="dataFormatura"></div><div id="localFormatura"></div></div>
<div class="card">
<h1>EDITOR DO DISPOSITIVO</h1>
<p>Estrutura inicial para integração com o Apps Script.</p>
<table><thead><tr><th>Ordem</th><th>Bloco</th><th>Fileira</th><th>Posições</th></tr></thead><tbody id="layout"></tbody></table>
<button>Adicionar Linha</button><button>Salvar Layout</button>
</div></div>
<script>
for(let i=1;i<=12;i++){
document.getElementById('layout').innerHTML+=`<tr><td>${i}</td><td><input value="1"></td><td><input value="${i}"></td><td><input></td></tr>`;
}
</script>
</body></html>
