<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width,initial-scale=1.0">

<title>
Editor do Dispositivo
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;
    background:#eef2f7;
    color:#1f2937;

}

.container{

    width:min(1700px,96%);
    margin:30px auto;

}

.topo-sistema{

    background:#0f4c81;
    color:white;

    border-radius:14px;

    padding:20px 28px;

    display:flex;

    align-items:center;

    gap:20px;

    margin-bottom:20px;

    box-shadow:0 4px 12px rgba(0,0,0,.15);

}

.topo-sistema img{

    width:72px;
    height:72px;
    object-fit:contain;

}

.caixa-formatura{

    background:white;

    border-radius:12px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.solenidade{

    font-size:28px;

    font-weight:800;

    color:#0f4c81;

}

.card{

    background:white;

    border-radius:14px;

    padding:24px;

    margin-bottom:24px;

    box-shadow:0 2px 12px rgba(0,0,0,.08);

}

.card h1{

    color:#0f4c81;

    margin-bottom:8px;

}

.card h2{

    color:#0f4c81;

    margin-bottom:20px;

}

label{

    display:block;

    font-size:13px;

    font-weight:700;

    margin-bottom:6px;

    color:#374151;

}

input,
select{

    width:100%;

    height:40px;

    border:1px solid #d1d5db;

    border-radius:8px;

    padding:0 12px;

    font-size:14px;

}

input:focus,
select:focus{

    outline:none;

    border-color:#0f4c81;

}

button{

    background:#0f4c81;

    color:white;

    border:none;

    border-radius:8px;

    padding:10px 18px;

    cursor:pointer;

    font-weight:700;

    transition:.2s;

}

button:hover{

    background:#0b3a62;

}

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#0f4c81;

    color:white;

    padding:12px;

    text-align:center;

    font-size:14px;

}

td{

    border:1px solid #e5e7eb;

    padding:8px;

    vertical-align:middle;

}

tbody tr:nth-child(even){

    background:#f9fafb;

}

.barra-acoes{

    display:flex;

    gap:10px;

    align-items:center;

    margin-bottom:20px;

}

.barra-acoes button{

    padding:10px 16px;

}

.modos{

    display:flex;

    justify-content:center;

    gap:40px;

    margin:25px 0;

}

.modos label{

    display:flex;

    align-items:center;

    gap:8px;

    font-size:16px;

    cursor:pointer;

}

.modos input{

    width:auto;

    height:auto;

}

.grid-auto{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:18px;

    margin-top:20px;

}

.preview{

    margin-top:20px;

    border:2px dashed #cbd5e1;

    border-radius:12px;

    background:#fafafa;

    padding:30px;

    overflow:auto;

    min-height:450px;

}

.preview h3{

    text-align:center;

    color:#0f4c81;

    margin-bottom:25px;

}

.area-dispositivo{

    display:flex;

    justify-content:center;

    gap:60px;

    align-items:flex-start;

    flex-wrap:wrap;

}

.bloco{

    display:flex;

    flex-direction:column;

    gap:8px;

}

.fileira{

    display:flex;

    gap:6px;

}

.cadeira{

    width:34px;

    height:34px;

    border-radius:6px;

    border:1px solid #93c5fd;

    background:#dbeafe;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:11px;

    font-weight:700;

}

.titulo-superior{

    text-align:center;

    font-size:22px;

    font-weight:800;

    color:#0f4c81;

    margin-bottom:30px;

}

.titulo-inferior{

    text-align:center;

    font-size:22px;

    font-weight:800;

    color:#0f4c81;

    margin-top:30px;

}

.oculto{

    display:none;

}

@media(max-width:1100px){

.grid-auto{

grid-template-columns:1fr;

}

.area-dispositivo{

gap:30px;

}

}
</style>

</head>

<body>

<div class="container">

    <div class="topo-sistema">

        <img
            src="babr.png"
            alt="BABR">

        <div>

            <div style="font-size:24px;font-weight:800;">

                SISTEMA DE GERENCIAMENTO DE AGRACIADOS

            </div>

            <div style="margin-top:6px;font-size:15px;font-weight:600;opacity:.9;">

                BASE AÉREA DE BRASÍLIA

            </div>

        </div>

    </div>





    <div class="caixa-formatura">

        <div
            id="solenidade"
            class="solenidade">

            Carregando...

        </div>

        <div
            id="dataFormatura"
            style="margin-top:10px;font-weight:600;">

        </div>

        <div
            id="localFormatura"
            style="margin-top:4px;font-weight:600;">

        </div>

    </div>





    <div class="card">

        <h1>

            Editor do Dispositivo

        </h1>

        <p style="margin-bottom:25px;color:#6b7280;">

            Configure automaticamente ou personalize manualmente
            o dispositivo utilizado durante a cerimônia.

        </p>





        <div class="modos">

            <label>

                <input
                    id="modoAutomatico"
                    name="modo"
                    type="radio">

                Modo Automático

            </label>

            <label>

                <input
                    id="modoManual"
                    name="modo"
                    type="radio">

                Modo Manual

            </label>

        </div>





        <div
            id="painelAutomatico">

            <div class="grid-auto">

                <div>

                    <label>

                        Quantidade de Blocos

                    </label>

                    <input
                        id="Quantidade_Blocos"
                        type="number">

                </div>

                <div>

                    <label>

                        Linhas por Bloco

                    </label>

                    <input
                        id="Linhas_Por_Bloco"
                        type="number">

                </div>

                <div>

                    <label>

                        Colunas por Bloco

                    </label>

                    <input
                        id="Colunas_Por_Bloco"
                        type="number">

                </div>

                <div>

                    <label>

                        Título Superior

                    </label>

                    <input
                        id="Titulo_Superior">

                </div>

                <div>

                    <label>

                        Título Inferior

                    </label>

                    <input
                        id="Titulo_Inferior">

                </div>

                <div
                    style="display:flex;align-items:flex-end;">

                    <button
                        id="btnSalvarConfiguracao">

                        Salvar Configuração

                    </button>

                </div>

            </div>

        </div>





        <div
            id="painelManual"
            class="oculto">

            <div class="barra-acoes">

                <button
                    id="btnNovaFileira">

                    ➕ Nova Fileira

                </button>

                <button
                    id="btnSalvarLayout">

                    💾 Salvar Layout

                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th style="width:70px;">

                            Ordem

                        </th>

                        <th style="width:90px;">

                            Bloco

                        </th>

                        <th style="width:90px;">

                            Fileira

                        </th>

                        <th style="width:120px;">

                            Posições

                        </th>

                        <th style="width:180px;">

                            Ações

                        </th>

                    </tr>

                </thead>

                <tbody id="layoutTabela">

                </tbody>

            </table>

        </div>

    </div>





    <div class="card">

        <h2>

            Pré-visualização

        </h2>

        <div
            id="preview"
            class="preview">

            <div
                class="titulo-superior"
                id="previewSuperior">

            </div>

            <div
                id="previewArea"
                class="area-dispositivo">

            </div>

            <div
                class="titulo-inferior"
                id="previewInferior">

            </div>

        </div>

    </div>

</div>

<script>
    const API_URL="https://script.google.com/macros/s/AKfycby_Oeki-w1mFC8VPSPuszOpsRvPVfZ1fuCyvvz1cYkXogwll6jO051eh0R9y3ibWr8A/exec";

let dados={};

let configuracao={};

let layout=[];

document.addEventListener("DOMContentLoaded",inicializar);



async function inicializar(){

    configurarEventos();

    await carregarDados();

}





function configurarEventos(){

    document
        .getElementById("modoAutomatico")
        .addEventListener("change",trocarModo);

    document
        .getElementById("modoManual")
        .addEventListener("change",trocarModo);

    document
        .getElementById("btnNovaFileira")
        .addEventListener("click",novaFileira);

    document
        .getElementById("btnSalvarConfiguracao")
        .addEventListener("click",salvarConfiguracao);

    document
        .getElementById("btnSalvarLayout")
        .addEventListener("click",salvarLayout);

    [

        "Quantidade_Blocos",

        "Linhas_Por_Bloco",

        "Colunas_Por_Bloco",

        "Titulo_Superior",

        "Titulo_Inferior"

    ]

    .forEach(id=>{

        document

            .getElementById(id)

            .addEventListener("input",atualizarPreview);

    });

}





async function carregarDados(){

    const resposta=await fetch(

        API_URL+

        "?action=dados&_="+

        Date.now()

    );

    dados=await resposta.json();

    configuracao=dados.config;

    layout=[...dados.layout];

    preencherCabecalho();

    preencherConfiguracao();

    renderTabela();

    atualizarPreview();

}





function preencherCabecalho(){

    document.getElementById("solenidade").textContent=

        configuracao.Solenidade || "";



    document.getElementById("dataFormatura").textContent=

        "Data: "+

        (configuracao.Data || "");



    document.getElementById("localFormatura").textContent=

        "Local: "+

        (configuracao.Local || "");

}





function preencherConfiguracao(){

    document.getElementById("Quantidade_Blocos").value=

        configuracao.Quantidade_Blocos;



    document.getElementById("Linhas_Por_Bloco").value=

        configuracao.Linhas_Por_Bloco;



    document.getElementById("Colunas_Por_Bloco").value=

        configuracao.Colunas_Por_Bloco;



    document.getElementById("Titulo_Superior").value=

        configuracao.Titulo_Superior;



    document.getElementById("Titulo_Inferior").value=

        configuracao.Titulo_Inferior;



    if(configuracao.Modo_Layout==="Automático"){

        document.getElementById("modoAutomatico").checked=true;

    }else{

        document.getElementById("modoManual").checked=true;

    }



    trocarModo();

}





function trocarModo(){

    const automatico=

        document.getElementById("modoAutomatico").checked;



    document

        .getElementById("painelAutomatico")

        .classList.toggle("oculto",!automatico);



    document

        .getElementById("painelManual")

        .classList.toggle("oculto",automatico);



    atualizarPreview();

}
    function renderTabela(){

    const tbody=document.getElementById("layoutTabela");

    tbody.innerHTML="";

    layout.forEach((item,index)=>{

        const tr=document.createElement("tr");

        tr.innerHTML=`

<td style="text-align:center;">
${item.Ordem}
</td>

<td>

<input
value="${item.Bloco}"
oninput="alterarBloco(${index},this.value)">

</td>

<td>

<input
type="number"
value="${item.Fileira}"
oninput="alterarFileira(${index},this.value)">

</td>

<td>

<input
type="number"
value="${item.Posições}"
oninput="alterarPosicoes(${index},this.value)">

</td>

<td>

<button onclick="subir(${index})">

▲

</button>

<button onclick="descer(${index})">

▼

</button>

<button onclick="novaAbaixo(${index})">

+

</button>

<button onclick="excluir(${index})">

🗑

</button>

</td>

`;

        tbody.appendChild(tr);

    });

}







function alterarBloco(indice,valor){

    layout[indice].Bloco=valor.toUpperCase();

    atualizarPreview();

}





function alterarFileira(indice,valor){

    layout[indice].Fileira=Number(valor);

    atualizarPreview();

}





function alterarPosicoes(indice,valor){

    layout[indice].Posições=Number(valor);

    atualizarPreview();

}





function renumerar(){

    layout.forEach((item,i)=>{

        item.Ordem=i+1;

    });

}





function subir(indice){

    if(indice===0)return;

    [layout[indice],layout[indice-1]]=[

        layout[indice-1],

        layout[indice]

    ];

    renumerar();

    renderTabela();

    atualizarPreview();

}





function descer(indice){

    if(indice===layout.length-1)return;

    [layout[indice],layout[indice+1]]=[

        layout[indice+1],

        layout[indice]

    ];

    renumerar();

    renderTabela();

    atualizarPreview();

}





function excluir(indice){

    if(!confirm("Excluir esta fileira?")) return;

    layout.splice(indice,1);

    renumerar();

    renderTabela();

    atualizarPreview();

}





function novaAbaixo(indice){

    const atual=layout[indice];

    layout.splice(indice+1,0,{

        Ordem:0,

        Bloco:atual.Bloco,

        Fileira:atual.Fileira+1,

        Posições:atual.Posições

    });

    reorganizarFileiras();

    renumerar();

    renderTabela();

    atualizarPreview();

}





function novaFileira(){

    if(layout.length===0){

        layout.push({

            Ordem:1,

            Bloco:"A",

            Fileira:1,

            Posições:10

        });

    }

    else{

        const ultima=layout[layout.length-1];

        layout.push({

            Ordem:layout.length+1,

            Bloco:ultima.Bloco,

            Fileira:ultima.Fileira+1,

            Posições:ultima.Posições

        });

    }

    renderTabela();

    atualizarPreview();

}





function reorganizarFileiras(){

    const mapa={};

    layout.forEach(item=>{

        if(!mapa[item.Bloco])

            mapa[item.Bloco]=1;

        else

            mapa[item.Bloco]++;

        item.Fileira=mapa[item.Bloco];

    });

}
    function atualizarPreview(){

    document.getElementById("previewSuperior").textContent=
        document.getElementById("Titulo_Superior").value;

    document.getElementById("previewInferior").textContent=
        document.getElementById("Titulo_Inferior").value;

    const area=document.getElementById("previewArea");

    area.innerHTML="";

    if(document.getElementById("modoAutomatico").checked){

        desenharAutomatico(area);

    }else{

        desenharManual(area);

    }

}






function desenharAutomatico(area){

    const qtdBlocos=
        Number(document.getElementById("Quantidade_Blocos").value);

    const linhas=
        Number(document.getElementById("Linhas_Por_Bloco").value);

    const colunas=
        Number(document.getElementById("Colunas_Por_Bloco").value);

    for(let b=1;b<=qtdBlocos;b++){

        const bloco=document.createElement("div");

        bloco.className="bloco";

        bloco.dataset.bloco=b;

        for(let l=1;l<=linhas;l++){

            const fileira=document.createElement("div");

            fileira.className="fileira";

            fileira.dataset.fileira=l;

            for(let c=1;c<=colunas;c++){

                const cadeira=document.createElement("div");

                cadeira.className="cadeira";

                cadeira.dataset.bloco=b;

                cadeira.dataset.fileira=l;

                cadeira.dataset.posicao=c;

                cadeira.innerHTML=c;

                fileira.appendChild(cadeira);

            }

            bloco.appendChild(fileira);

        }

        area.appendChild(bloco);

    }

}






function desenharManual(area){

    const grupos={};

    layout.forEach(item=>{

        if(!grupos[item.Bloco]){

            grupos[item.Bloco]=[];

        }

        grupos[item.Bloco].push(item);

    });

    Object.keys(grupos)

        .sort()

        .forEach(nome=>{

            const bloco=document.createElement("div");

            bloco.className="bloco";

            bloco.dataset.bloco=nome;

            grupos[nome]

                .sort((a,b)=>a.Fileira-b.Fileira)

                .forEach(fileiraInfo=>{

                    const fileira=document.createElement("div");

                    fileira.className="fileira";

                    fileira.dataset.fileira=fileiraInfo.Fileira;

                    for(let i=1;i<=Number(fileiraInfo.Posições);i++){

                        const cadeira=document.createElement("div");

                        cadeira.className="cadeira";

                        cadeira.dataset.bloco=nome;

                        cadeira.dataset.fileira=fileiraInfo.Fileira;

                        cadeira.dataset.posicao=i;

                        cadeira.innerHTML=i;

                        fileira.appendChild(cadeira);

                    }

                    bloco.appendChild(fileira);

                });

            area.appendChild(bloco);

        });

}
    async function salvarConfiguracao(){

    const dados={

        action:"salvarConfiguracao",

        Modo_Layout:
            document.getElementById("modoAutomatico").checked
            ? "Automático"
            : "Manual",

        Quantidade_Blocos:Number(
            document.getElementById("Quantidade_Blocos").value
        ),

        Linhas_Por_Bloco:Number(
            document.getElementById("Linhas_Por_Bloco").value
        ),

        Colunas_Por_Bloco:Number(
            document.getElementById("Colunas_Por_Bloco").value
        ),

        Titulo_Superior:
            document.getElementById("Titulo_Superior").value,

        Titulo_Inferior:
            document.getElementById("Titulo_Inferior").value

    };

    try{

        const resposta=await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":"text/plain;charset=utf-8"
            },

            body:JSON.stringify(dados)

        });

        const retorno=await resposta.json();

        if(retorno.ok){

            alert("Configuração salva com sucesso.");

        }else{

            alert("Erro ao salvar configuração.");

        }

    }catch(e){

        console.error(e);

        alert("Falha de comunicação com o servidor.");

    }

}
    async function salvarLayout(){

    renumerar();

    const dados={

        action:"salvarLayout",

        layout:layout

    };

    try{

        const resposta=await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":"text/plain;charset=utf-8"
            },

            body:JSON.stringify(dados)

        });

        const retorno=await resposta.json();

        if(retorno.ok){

            alert("Layout salvo com sucesso.");

        }else{

            alert("Erro ao salvar layout.");

        }

    }catch(e){

        console.error(e);

        alert("Falha de comunicação com o servidor.");

    }

}
    async function atualizarSistema(){

    await carregarDados();

}
    /* ============================================================
   CONTROLE DE ALTERAÇÕES
============================================================ */

let alterado=false;

function marcarAlterado(){

    alterado=true;

}

window.addEventListener("beforeunload",function(e){

    if(!alterado) return;

    e.preventDefault();

    e.returnValue="";

});

document.addEventListener("input",()=>{

    marcarAlterado();

});



/* ============================================================
   ATALHOS
============================================================ */

document.addEventListener("keydown",function(e){

    if(e.ctrlKey && e.key.toLowerCase()=="s"){

        e.preventDefault();

        if(document.getElementById("modoAutomatico").checked){

            salvarConfiguracao();

        }else{

            salvarLayout();

        }

    }

});



/* ============================================================
   APÓS SALVAR
============================================================ */

async function salvarConfiguracao(){

    const dados={

        action:"salvarConfiguracao",

        Modo_Layout:
            document.getElementById("modoAutomatico").checked
            ?"Automático"
            :"Manual",

        Quantidade_Blocos:Number(document.getElementById("Quantidade_Blocos").value),

        Linhas_Por_Bloco:Number(document.getElementById("Linhas_Por_Bloco").value),

        Colunas_Por_Bloco:Number(document.getElementById("Colunas_Por_Bloco").value),

        Titulo_Superior:document.getElementById("Titulo_Superior").value,

        Titulo_Inferior:document.getElementById("Titulo_Inferior").value

    };

    try{

        const resposta=await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":"text/plain;charset=utf-8"
            },

            body:JSON.stringify(dados)

        });

        const json=await resposta.json();

        if(json.ok){

            alterado=false;

            await atualizarSistema();

            alert("Configuração salva.");

        }else{

            alert("Erro ao salvar.");

        }

    }catch(err){

        console.error(err);

        alert("Falha na comunicação.");

    }

}





async function salvarLayout(){

    renumerar();

    try{

        const resposta=await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":"text/plain;charset=utf-8"
            },

            body:JSON.stringify({

                action:"salvarLayout",

                layout:layout

            })

        });

        const json=await resposta.json();

        if(json.ok){

            alterado=false;

            await atualizarSistema();

            alert("Layout salvo.");

        }else{

            alert("Erro ao salvar.");

        }

    }catch(err){

        console.error(err);

        alert("Falha na comunicação.");

    }

}



/* ============================================================
   FIM DO ARQUIVO
============================================================ */

</script>

</body>

</html>
