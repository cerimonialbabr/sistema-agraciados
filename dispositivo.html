<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editor do Dispositivo</title><style>body{font-family:Arial;background:#f3f5f8;margin:0}.container{max-width:900px;margin:auto;padding:16px}.topo{background:#071b33;color:#fff;padding:18px;border-radius:16px;text-align:center;font-weight:bold;font-size:22px}.card{background:#fff;padding:18px;border-radius:14px;margin-top:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}label{display:block;margin-top:12px;font-weight:bold}input[type=text],input[type=number]{width:100%;padding:8px;box-sizing:border-box}button{margin-top:16px;padding:12px 18px;background:#0b3a75;color:#fff;border:none;border-radius:10px;cursor:pointer}.hidden{display:none}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #ddd;padding:6px}</style></head><body><div class="container"><div class="topo">EDITOR DO DISPOSITIVO</div><div class="card"><label><input type="radio" name="m" value="A" checked onclick="t()"> Automático</label><label><input type="radio" name="m" value="M" onclick="t()"> Manual</label><label>Quantidade de Blocos</label><input type="number" value="3"><label>Linhas por Bloco</label><input type="number" value="12"><label>Colunas por Bloco</label><input type="number" value="5"><label>Título Superior</label><input type="text" value="TRIBUNA"><label>Título Inferior</label><input type="text" value="TELÃO"><button>Salvar Configuração</button></div><div id="man" class="card hidden"><h3>Layout Manual</h3><table><tr><th>Ordem</th><th>Bloco</th><th>Fileira</th><th>Posições</th></tr><tbody id="tb"></tbody></table><button>Salvar Layout</button></div></div><script>function t(){man.classList.toggle("hidden",document.querySelector("input[value=M]").checked==false)};for(let i=1;i<=12;i++){tb.innerHTML+=`<tr><td>${i}</td><td><input value="1"></td><td><input value="${i}"></td><td><input></td></tr>`}</script></body></html>
